name: "Build"
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  luacheck:
    uses: ./.github/workflows/luacheck.yml
  test:
    needs: [sqlx-prepare]
    uses: ./.github/workflows/test.yml
  build:
    needs: [sqlx-prepare]
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    strategy:
      matrix:
        target: ["aarch64", "desktop", "kindle", "kindlehf", "kindlea9", "android"]
    steps:
    - uses: actions/checkout@v3
      with:
        persist-credentials: false
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "lts/*"

    - name: Install system deps
      run: sudo apt update && sudo apt install -y pkg-config libfontconfig1-dev libfreetype6-dev podman gettext && echo "CROSS_CONTAINER_ENGINE=podman" >> $GITHUB_ENV

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
 
    - name: Cache Podman images
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/containers
        key: ${{ runner.os }}-podman-cross-${{ matrix.target }}

    - name: Install Rust 1.95.0
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.95.0
        profile: minimal
        components: rustfmt, clippy
        override: true

    - name: Install cross
      run: cargo install cross

    - name: Cache Rust Dependencies
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "backend -> target"
        prefix-key: "rust-cache-${{ matrix.target }}"

    - name: Install dependencies
      run: npm install
    - name: Get next version
      run: npx semantic-release --dry-run
      id: get-next-version
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Build plugin
      run: |
        export SEMANTIC_RELEASE_VERSION="${{ steps.get-next-version.outputs.new-release-git-tag }}"
        # Using `--impure` here kinda sucks, but it's needed so that we can insert the `semantic-release`
        # version into the build.
        bash scripts/build-all.sh ${{ matrix.target }}
    - name: Package plugin contents
      run: "cd build && zip -r rakuyomi-${{ matrix.target }}.zip rakuyomi.koplugin"
    - name: Upload plugin as workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.target }} build
        path: build/rakuyomi-${{ matrix.target }}.zip

    - uses: actions/setup-java@v4
      if: ${{ matrix.target == 'android' }}
      with:
        distribution: temurin
        java-version: 17

    - uses: android-actions/setup-android@v3
      if: ${{ matrix.target == 'android' }}

    - name: Install Android NDK (r23b)
      if: ${{ matrix.target == 'android' }}
      run: sdkmanager "ndk;23.1.7779620"

    - name: Configure NDK
      if: ${{ matrix.target == 'android' }}
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.1.7779620" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/23.1.7779620" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/ndk/23.1.7779620/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Install cargo-ndk
      if: ${{ matrix.target == 'android' }}
      run: cargo install cargo-ndk && rustup target install aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

    - name: Build plugin for android
      if: ${{ matrix.target == 'android' }}
      run: bash scripts/build-rust-android.sh
      
  sqlx-prepare:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
    - uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Install system deps
      run: sudo apt update && sudo apt install -y pkg-config libfontconfig1-dev libfreetype6-dev

    - name: Install Rust 1.95.0
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.95.0
        profile: minimal
        override: true

    - name: Install sqlx-cli
      run: cargo install sqlx-cli --no-default-features --features sqlite

    - name: Regenerate sqlx cache
      run: |
        cd backend
        export DATABASE_URL="sqlite://dev.db"
        sqlx database create
        sqlx migrate run
        cargo sqlx prepare --workspace

    - name: Commit updated cache if changed
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add backend/.sqlx
        git diff --staged --quiet || git commit -m "chore: update sqlx query cache [skip ci]"
        git push
        
  generate-settings-schema:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
    - uses: actions/checkout@v3
    
    - name: Install system deps
      run: sudo apt update && sudo apt install -y pkg-config libfontconfig1-dev libfreetype6-dev podman gettext && echo "CROSS_CONTAINER_ENGINE=podman" >> $GITHUB_ENV

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
 
    - name: Install Rust 1.95.0
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 1.95.0
        profile: minimal
        components: rustfmt, clippy
        override: true

    - name: Build settings schema
      run: bash scripts/generate-settings-schema.sh

    - name: Upload plugin as workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: settings.schema.json
        path: build/settings.schema.json
  
  release:
    runs-on: ubuntu-latest
    needs: [build, generate-settings-schema]
    if: ${{ github.ref == 'refs/heads/main' }} 
    steps:
    - uses: actions/checkout@v3
      with:
        persist-credentials: true
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "lts/*"
    - name: Install dependencies
      run: npm install
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: build
        merge-multiple: true
    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release
